<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#E5E7EB"/>
  <rect x="0" y="0" width="1440" height="900" fill="#0F172A" fill-opacity="0.28"/>
  <rect x="420" y="170" width="600" height="510" rx="28" fill="#FFFFFF"/>
  <text x="470" y="236" fill="#0F172A" font-size="34" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">选择客户端</text>
  <text x="470" y="280" fill="#64748B" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial">如果你的分组平台是 Antigravity，导入前会多看到这一步。</text>
  <text x="470" y="312" fill="#64748B" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial">请选择要导入到 CC-Switch 的客户端类型：</text>

  <rect x="470" y="360" width="230" height="186" rx="24" fill="#F8FAFC" stroke="#2563EB" stroke-width="4"/>
  <rect x="504" y="392" width="54" height="54" rx="12" fill="#E0F2FE"/>
  <path d="M518 420L532 432L546 420" stroke="#0369A1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M518 438H546" stroke="#0369A1" stroke-width="4" stroke-linecap="round"/>
  <text x="504" y="484" fill="#0F172A" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">Claude Code</text>
  <text x="504" y="518" fill="#64748B" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial">导入为 Claude Code 配置</text>

  <rect x="740" y="360" width="230" height="186" rx="24" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="774" y="392" width="54" height="54" rx="12" fill="#FEF3C7"/>
  <path d="M792 406L800 426L818 426L803 438L809 456L792 444L775 456L781 438L766 426L784 426Z" fill="#D97706"/>
  <text x="774" y="484" fill="#0F172A" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">Gemini CLI</text>
  <text x="774" y="518" fill="#64748B" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial">导入为 Gemini CLI 配置</text>

  <rect x="820" y="592" width="150" height="52" rx="16" fill="#E2E8F0"/>
  <text x="866" y="626" fill="#475569" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">取消</text>

  <circle cx="1028" cy="410" r="28" fill="#2563EB"/>
  <text x="1019" y="419" fill="#FFFFFF" font-size="26" font-family="Arial" font-weight="700">1</text>
  <path d="M1000 410C982 410 972 414 958 420" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <rect x="1038" y="372" width="250" height="78" rx="18" fill="#EFF6FF"/>
  <text x="1064" y="414" fill="#1D4ED8" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">你用 Claude Code 就选左边</text>

  <circle cx="1028" cy="504" r="28" fill="#D97706"/>
  <text x="1019" y="513" fill="#FFFFFF" font-size="26" font-family="Arial" font-weight="700">2</text>
  <path d="M1000 504C986 504 980 502 966 496" stroke="#D97706" stroke-width="6" stroke-linecap="round"/>
  <rect x="1038" y="466" width="248" height="78" rx="18" fill="#FFF7ED"/>
  <text x="1064" y="508" fill="#9A3412" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">你用 Gemini CLI 就选右边</text>

  <rect x="470" y="584" width="314" height="60" rx="18" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
  <text x="494" y="621" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">选完后浏览器会继续唤起 CC Switch</text>
</svg>
