<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#E5E7EB"/>
  <rect x="0" y="0" width="1440" height="900" fill="#0F172A" fill-opacity="0.25"/>
  <rect x="370" y="88" width="700" height="724" rx="28" fill="#FFFFFF"/>
  <text x="420" y="146" fill="#0F172A" font-size="34" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">创建密钥</text>
  <text x="420" y="184" fill="#64748B" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial">没有 API Key 时，先创建一个。名字可以随便写，分组必须选可用分组。</text>

  <text x="420" y="254" fill="#334155" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">名称</text>
  <rect x="420" y="272" width="600" height="62" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="448" y="312" fill="#0F172A" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial">我的第一个密钥</text>

  <text x="420" y="390" fill="#334155" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">分组</text>
  <rect x="420" y="408" width="600" height="62" rx="16" fill="#F8FAFC" stroke="#2563EB" stroke-width="3"/>
  <text x="448" y="448" fill="#0F172A" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial">Claude / GPT / Gemini 可用分组</text>
  <path d="M972 433L992 453L1012 433" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="420" y="530" fill="#334155" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">状态</text>
  <rect x="420" y="548" width="290" height="62" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="448" y="588" fill="#0F172A" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial">active</text>

  <rect x="420" y="664" width="600" height="78" rx="18" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
  <text x="448" y="705" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">0 基础建议：</text>
  <text x="582" y="705" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial">先只填“名称”和“分组”，其他保持默认即可。</text>

  <rect x="760" y="758" width="120" height="52" rx="16" fill="#E2E8F0"/>
  <text x="796" y="792" fill="#475569" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">取消</text>
  <rect x="894" y="758" width="126" height="52" rx="16" fill="#1D4ED8"/>
  <text x="934" y="792" fill="#FFFFFF" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">保存</text>

  <circle cx="1088" cy="305" r="28" fill="#F97316"/>
  <text x="1079" y="314" fill="#FFFFFF" font-size="26" font-family="Arial" font-weight="700">1</text>
  <path d="M1062 312C1038 316 1022 314 1008 310" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <rect x="1074" y="244" width="244" height="74" rx="18" fill="#FFF7ED"/>
  <text x="1100" y="286" fill="#9A3412" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">名称只是方便你自己识别</text>

  <circle cx="1088" cy="439" r="28" fill="#2563EB"/>
  <text x="1079" y="448" fill="#FFFFFF" font-size="26" font-family="Arial" font-weight="700">2</text>
  <path d="M1060 440C1036 440 1026 440 1016 440" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <rect x="1074" y="392" width="252" height="92" rx="18" fill="#EFF6FF"/>
  <text x="1100" y="430" fill="#1D4ED8" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">分组决定这个密钥能接入</text>
  <text x="1100" y="458" fill="#1D4ED8" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">哪些模型和平台</text>

  <circle cx="1060" cy="784" r="28" fill="#16A34A"/>
  <text x="1051" y="793" fill="#FFFFFF" font-size="26" font-family="Arial" font-weight="700">3</text>
  <path d="M1034 784C1018 784 1006 784 992 784" stroke="#16A34A" stroke-width="6" stroke-linecap="round"/>
  <rect x="1074" y="736" width="216" height="76" rx="18" fill="#F0FDF4"/>
  <text x="1100" y="778" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="700">点“保存”后回到列表</text>
</svg>
